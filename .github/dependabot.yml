version: 2
updates:
  # This fork takes GitHub Actions updates through upstream Ghostty merges,
  # and the Holy-owned workflows pin their actions deliberately. The zero
  # limit keeps dependabot security alerts available without opening PRs;
  # raise it to re-enable update PRs.
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 0
    schedule:
      interval: "monthly"
